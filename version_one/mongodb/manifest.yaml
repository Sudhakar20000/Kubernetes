apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: flipkart
  labels:
    project: flipkart
    tier: db
    component: mongodb
spec:
  replicas: 2
  selector:
    matchLabels:
      project: flipkart
      tier: db
      component: mongodb
  template:
    metadata:
      labels:
        project: flipkart
        tier: db
        component: mongodb
    spec:
      containers:
      - name: mongodb
        image: sudhakar20000/mongodb:v1
        ports:
        - containerPort: 27017

---

apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: flipkart
  labels:
    project: flipkart
    tier: db
    component: mongodb
spec:
  selector:
    project: flipkart
    tier: db
    component: mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017 


