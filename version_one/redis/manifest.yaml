apiVersion: apps/v1
kind: Deployment
metadata: 
  name: redis
  namespace: flipkart
  labels:
    project: flipkart
    tier: db
    component: redis
spec: 
  replicas: 2
  selector:
    matchLabels:
      project: flipkart
      tier: db
      component: redis
  template:
    metadata:
      labels:
        project: flipkart
        tier: db
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
---

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: flipkart
  labels:
    project: flipkart
    tier: db
    component: redis
spec:
  selector:
    project: flipkart
    tier: db
    component: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379


        