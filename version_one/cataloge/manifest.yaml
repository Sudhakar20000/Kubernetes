apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: flipkart
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: flipkart
  labels:
    project: flipkart
    tier: backend
    component: catalogue
spec:
  replicas: 2
  selector:
    matchLabels:
      project: flipkart
      tier: backend
      component: catalogue
  template:
    metadata:
      labels:
        project: flipkart
        tier: backend
        component: catalogue
    spec:
      containers:
      - name: catalogue
        image: sudhakar20000/catalogue:v1
        envFrom:
        - configMapRef:
            name: catalogue
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: flipkart
  labels:
    project: flipkart
    tier: backend
    component: catalogue
spec:
  selector:
    project: flipkart
    tier: backend
    component: catalogue
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080