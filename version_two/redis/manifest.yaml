
apiVersion: v1
kind: Service
metadata:
  name: headless-redis
  namespace: flipkart
  labels:
    project: flipkart
    tier: db
    component: redis
spec:
  clusterIP: None
  selector:
    project: flipkart
    tier: db
    component: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: flipkart
  labels:
    project: flipkart
    tier: db
    component: redis
spec:
  selector:
    project: flipkart
    tier: db
    component: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---

apiVersion: apps/v1
kind: StatefulSet
metadata: 
  name: redis
  namespace: flipkart
  labels:
    project: flipkart
    tier: db
    component: redis
spec: 
  serviceName: headless-redis
  replicas: 1
  selector:
    matchLabels:
      project: flipkart
      tier: db
      component: redis
  template:
    metadata:
      labels:
        project: flipkart
        tier: db
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis
          mountPath: /data
  # PVC
  volumeClaimTemplates:
  - metadata:
      name: redis
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "flipkart-ebs"
      resources:
        requests:
          storage: 1Gi




        