apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
  namespace: flipkart
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
---
apiVersion: v1
kind: Secret
metadata:
  name: payment
  namespace: flipkart

type: Opaque
data:
  AMQP_USER: cm9ib3Nob3AK
  AMQP_PASS: cm9ib3Nob3AxMjMK
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: flipkart
  # labels related to deployment resource
  labels:
    project: flipkart
    tier: backend
    component: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      project: flipkart
      tier: backend
      component: payment
  # Pod
  template:
    metadata:
      labels:
        project: flipkart
        tier: backend
        component: payment
    spec:
      containers:
      - name: payment
        image: sudhakar20000/payment:v1
        ports:
        - name: liveness-port
          containerPort: 8080
        startupProbe:
          httpGet:
            path: /health
            port: liveness-port
            # we are giving 5 minutes to start the application
          failureThreshold: 12
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: payment
        - secretRef:
            name: payment
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: flipkart
  # servicer labels
  labels:
    project: flipkart
    tier: backend
    component: payment
spec:
  # Service uses the below labels to select the pods
  selector:
    project: flipkart
    tier: backend
    component: payment
  ports:
    - protocol: TCP
      port: 8080 # service port
      targetPort: 8080 # container port

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment
  namespace: flipkart
  labels:
    project: flipkart
    tier: backend
    component: payment
spec:
  # deployment reference
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50